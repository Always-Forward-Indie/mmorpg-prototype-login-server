networks:
  mmo_network:
    name: mmo_network
    driver: bridge

services:
  db:
    image: postgres:15.5
    container_name: mmorpg_prototype_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mmo_prototype
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./mmo_prototype_dump.sql:/docker-entrypoint-initdb.d/mmo_prototype_dump.sql
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - mmo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mmo_prototype"]
      interval: 5s
      retries: 5
      timeout: 3s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
        reservations:
          cpus: "1"
          memory: 1024M

  login-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "27014:27014"
    environment:
      - LOG_LEVEL=info
      - LOG_LEVEL_NETWORK=warn
      - LOG_LEVEL_GAMELOOP=warn
      - LOG_LEVEL_EVENTS=warn
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mmo_network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M
        reservations:
          cpus: "1"
          memory: 512M

volumes:
  db_data:
