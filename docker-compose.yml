networks:
  mmo_network:
    name: mmo_network
    driver: bridge

services:
  db:
    image: postgres:15.5
    container_name: mmorpg_prototype_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mmo_prototype
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./mmo_prototype_dump.sql:/docker-entrypoint-initdb.d/mmo_prototype_dump.sql
    ports:
      - "5432:5432"
    networks:
      - mmo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mmo_prototype"]
      interval: 5s
      retries: 5
      timeout: 3s

  login-server:
    build: .
    ports:
      - "27014:27014"
    volumes:
      - ./src:/usr/src/app/src  # ✅ Mount only the `src` folder
      - ./include:/usr/src/app/include  # ✅ Mount only the `include` folder
      - ./CMakeLists.txt:/usr/src/app/CMakeLists.txt  # ✅ Mount CMakeLists.txt so new source files are picked up without image rebuilds
    environment:
      - ENV=development
      - LOG_LEVEL=info
      - LOG_LEVEL_NETWORK=warn
      - LOG_LEVEL_GAMELOOP=warn
      - LOG_LEVEL_EVENTS=warn
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mmo_network

volumes:
  db_data:
